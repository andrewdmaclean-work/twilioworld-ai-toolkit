name: test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install shellcheck + jq
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq

      - name: Run smoke tests
        run: ./test.sh
